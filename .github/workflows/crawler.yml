name: PickSale Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * *"
    - cron: "0 11 * * *"

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PICKSALE_SALES_API_URL: ${{ secrets.PICKSALE_SALES_API_URL }}
      PICKSALE_COMMUNITY_API_URL: ${{ secrets.PICKSALE_COMMUNITY_API_URL }}
      PICKSALE_API_KEY: ${{ secrets.PICKSALE_API_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      REQUEST_TIMEOUT_SECONDS: "20"
      ENABLE_GOOGLE_NEWS: "true"
      ENABLE_COMMUNITY_UPLOAD: "true"
      ENABLE_COMMUNITY_PROMOTION: "false"
      DEBUG_SAVE_HTML: "false"
      DEBUG_DIR: "scraper_debug"
      COMMUNITY_TARGET_PLATFORMS: "coupang,oliveyoung,musinsa,KREAM,SSG,ohouse,29CM,wconcept"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Run crawler
        shell: bash
        run: |
          set -o pipefail
          python main.py 2>&1 | tee crawler.log

      - name: Upload crawler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawler-log
          path: crawler.log
